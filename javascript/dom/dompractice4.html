<body>
    <ul id="tech-stack"></ul>

    <ul class="frameworks">
  <li>React</li>
  <li>Node.js</li>
  <li>MongoDB</li>
</ul>

<script>
    // 🟢 Level 1: Beginner (Warm-up)
// Task: Given an empty HTML unordered list with the ID #tech-stack, write JavaScript to add three list items: "HTML", "CSS", and "JavaScript" using the optimized Method B (createTextNode).
    const techStack = document.getElementById('tech-stack');
    const technologies1=document.createElement('li');
    const textNode1=document.createTextNode("HTML");
    technologies1.appendChild(textNode1);
    techStack.appendChild(technologies1);
    const technologies2=document.createElement('li');
    const textNode2=document.createTextNode("css");
    technologies2.appendChild(textNode2);
    techStack.appendChild(technologies2);
    const technologies3=document.createElement('li');
    const textNode3=document.createTextNode("javascript");  
    technologies3.appendChild(textNode3);
    techStack.appendChild(technologies3);

    //🟡 Level 2: Intermediate (Surgical Edits)
// Task: Imagine a list containing ["React", "Angular", "Vue"].

// Use JavaScript to find the item containing "Angular".

// Replace it completely with "Node.js" using the replaceWith method.

// Update the item containing "Vue" to "MongoDB" using the outerHTML property.

//answer 2 
const secondItem = document.querySelector(".frameworks li:nth-child(2)");
const newItem = document.createElement("li");
newItem.textContent = "Node.js";
secondItem.replaceWith(newItem);
