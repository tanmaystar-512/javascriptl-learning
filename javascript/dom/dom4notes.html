<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom 4  lecture notes  </title>
    <style>
        body{
            background-color: black;
            color: white;
        }
    </style>

</head>
<body>

    <ul class="language">
        <li>javascript</li>
        <li>java</li>
        <li>c++</li>
</body>
<script>
    //.creating elemrnt
    //method 1 innerhtml
    const li=document.createElement('li');
    li.innerHTML=   "python";
    li.style.color="red";
    li.style.backgroundColor="green";
    li.style.fontSize="20px";
    li.style.padding="5px";
    //document.body.appendChild(li);
    document.querySelector('.language').appendChild(li);
    //method2 create text node
    const li2=document.createElement('li');
    const textNode=document.createTextNode("css");
    li2.appendChild(textNode);
    document.querySelector('.language').appendChild(li2);

    // editing element 
    const newli=document.createElement('li');
    newli.textContent="html";
    const secondli=document.querySelector('li:nth-child(2)');
    secondli.replaceWith(newli);
    //method 2 
    const  firstli=document.querySelector('li:first-child');
firstli.outerHTML="<li>typescript</li>";
    document.querySelector('.language').appendChild(newli);
    //removing element
    const lastli=document.querySelector('li:last-child');
    lastli.remove();
</script>
</html>
