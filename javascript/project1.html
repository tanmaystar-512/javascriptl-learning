<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Color Switcher Game</title>
</head>
<style>
    body{
        background-color:#ffffff;
        color:#212121;
        font-family:Arial, sans-serif;
        font-size:16px;
        font-weight:400;
        text-align:left;
        text-decoration:none;
    
    }
   .style{
height: 50px;
width: 50px;
display: inline-block;
border:2px solid #000000;
padding-left: 30px;
padding-top: 30px;
}
#black{

}
#white{

}
#red{

}
#blue{
    background-color: blue;
}
.class-container{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding-left:50px;
}



</style>
<body>
    <h1 style="text-align: center;">Color Switcher Game</h1>
    <div id="color-container">
    <span class="style" id="black">Black</span>
    <span class="style" id="white">White</span>     
    <span class="style" id="red">Red</span>
    <span class="style" id="blue">Blue</span>
    </div>
